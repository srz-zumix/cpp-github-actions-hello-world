name: GitHub Actions Lint
on:
  pull_request:

permissions: {}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write    
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false      
      - uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-review
