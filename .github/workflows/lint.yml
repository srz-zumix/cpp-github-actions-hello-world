name: GitHub Actions Lint
on:
  pull_request:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false      
      - uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-review
